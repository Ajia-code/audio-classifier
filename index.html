<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/audio@latest"></script>
</head>

<body>
<script>
const URL = "https://teachablemachine.withgoogle.com/models/YOUR_MODEL/";

async function init() {
  const model = await tmAudio.load(URL + "model.json", URL + "metadata.json");
  const recognizer = await model.createRecognizer();

  await recognizer.listen(result => {
    const scores = result.scores;
    const maxIndex = scores.indexOf(Math.max(...scores));
    const label = model.wordLabels()[maxIndex];

    window.AppInventor.setWebViewString(label);

  }, { probabilityThreshold: 0.75 });
}

init();
</script>
</body>
</html>
